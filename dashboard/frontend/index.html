<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ingenuityai_icon_contained.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IngenuityAI</title>
    <!--
      Apply the saved theme class before the page renders to prevent a flash
      of the wrong theme (FOUC). Runs synchronously, before any stylesheet.
    -->
    <script>
      (function () {
        var pref = localStorage.getItem('theme') || 'system';
        var dark =
          pref === 'dark' ||
          (pref === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
